<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#32e1c5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Maricota Cadastro</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* === RESET & VARIABLES === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #32e1c5; --purple: #bf5cf8; --pink: #ff6fd9;
  --orange: #ff884d; --yellow: #ffda42; --blue: #00bbf7;
  --bg: #f8f9fa; --card: #ffffff; --text: #2d2d2d; --muted: #8e8e93;
  --border: #e5e5ea; --danger: #ff3b30; --success: #34c759;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --font: 'Fredoka', sans-serif;
}
html { font-size: 16px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100dvh; max-width: 480px; margin: 0 auto;
  -webkit-font-smoothing: antialiased; padding-bottom: 80px;
}
h1, h2, h3 { font-weight: 600; }
input, select, textarea, button { font-family: var(--font); font-size: 1rem; }

/* === SCREENS === */
.screen { display: none; padding: 20px; animation: fadeIn .3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* === LOGIN SCREEN === */
#login {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: 40px 24px; text-align: center;
  background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 50%, var(--purple) 100%);
  position: fixed; inset: 0; z-index: 999;
}
#login.hidden { display: none !important; }
#login .logo { font-size: 4rem; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.15)); }
#login h1 { color: #fff; font-size: 1.8rem; margin-bottom: 4px; font-weight: 700; }
#login .subtitle { color: rgba(255,255,255,.85); font-size: .95rem; margin-bottom: 32px; }
#login .input-group { width: 100%; max-width: 300px; position: relative; }
#login input {
  width: 100%; padding: 16px 20px; border: none; border-radius: 50px;
  font-size: 1.05rem; background: rgba(255,255,255,.95); text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.12); outline: none;
}
#login input::placeholder { color: var(--muted); }
#login .btn-enter {
  width: 100%; max-width: 300px; margin-top: 16px; padding: 16px;
  border: none; border-radius: 50px; background: var(--orange);
  color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,136,77,.4); transition: transform .15s;
}
#login .btn-enter:active { transform: scale(.97); }
#login .error { color: var(--yellow); margin-top: 12px; font-size: .9rem; display: none; }

/* === HEADER === */
.header {
  display: flex; align-items: center; gap: 12px; padding: 16px 0; margin-bottom: 8px;
}
.header .logo-sm { font-size: 1.6rem; }
.header h2 { font-size: 1.25rem; color: var(--text); }
.header .storage-badge {
  margin-left: auto; font-size: .75rem; padding: 4px 10px;
  background: var(--border); border-radius: 50px; color: var(--muted);
}

/* === FORM === */
.form-section { margin-bottom: 20px; }
.form-section h3 {
  font-size: .85rem; text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted); margin-bottom: 10px; font-weight: 500;
}
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: .9rem; font-weight: 500;
  margin-bottom: 6px; color: var(--text);
}
.field input, .field select, .field textarea {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card);
  font-size: 1rem; transition: border-color .2s; outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--teal);
}
.field textarea { resize: vertical; min-height: 80px; }
.field .hint { font-size: .8rem; color: var(--muted); margin-top: 4px; }

/* === BARCODE SCANNER === */
.btn-scan {
  width: 100%; padding: 18px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  color: #fff; font-size: 1.15rem; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 20px rgba(191,92,248,.35); margin-bottom: 12px;
  transition: transform .15s; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-scan:active { transform: scale(.97); }
.btn-scan-manual {
  width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 50px;
  background: var(--card); color: var(--muted); font-size: .9rem; font-weight: 500;
  cursor: pointer; margin-bottom: 12px;
}
#scannerContainer { border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; display: none; }
#scannerContainer.active { display: block; }
.btn-stop-scan {
  width: 100%; padding: 12px; border: none; border-radius: 50px;
  background: var(--danger); color: #fff; font-size: .95rem; font-weight: 600;
  cursor: pointer; margin-bottom: 12px; display: none;
}
.btn-stop-scan.active { display: block; }
.barcode-result {
  display: none; align-items: center; gap: 10px; padding: 14px 16px;
  background: #e8f8f0; border: 2px solid var(--success); border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.barcode-result.active { display: flex; }
.barcode-result .checkmark {
  width: 28px; height: 28px; background: var(--success); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0;
}
.barcode-result .barcode-value { font-size: 1.1rem; font-weight: 600; color: var(--text); flex: 1; }
.barcode-result .barcode-clear { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; }
.manual-barcode-field { display: none; margin-bottom: 12px; }
.manual-barcode-field.active { display: block; }
.product-card .info .barcode-meta { font-size: .75rem; color: var(--purple); font-weight: 500; }

/* === PHOTO UPLOAD === */
.photo-area {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; background: var(--card);
}
.photo-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
.photo-btns button {
  padding: 12px 20px; border: none; border-radius: 50px;
  font-size: .9rem; font-weight: 500; cursor: pointer; transition: transform .15s;
}
.photo-btns button:active { transform: scale(.95); }
.btn-camera { background: var(--teal); color: #fff; }
.btn-gallery { background: var(--purple); color: #fff; }
.photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.photo-thumb {
  width: 72px; height: 72px; border-radius: 10px; overflow: hidden;
  position: relative; box-shadow: var(--shadow);
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove {
  position: absolute; top: -4px; right: -4px; width: 22px; height: 22px;
  background: var(--danger); color: #fff; border: 2px solid #fff;
  border-radius: 50%; font-size: .7rem; display: flex; align-items: center;
  justify-content: center; cursor: pointer; line-height: 1;
}

/* === GENDER TOGGLES === */
.gender-group { display: flex; gap: 8px; }
.gender-btn {
  flex: 1; padding: 12px 8px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card);
  text-align: center; font-size: .9rem; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.gender-btn.active-f { border-color: var(--pink); background: #fff0f8; color: var(--pink); }
.gender-btn.active-m { border-color: var(--blue); background: #f0f8ff; color: var(--blue); }
.gender-btn.active-u { border-color: var(--purple); background: #f8f0ff; color: var(--purple); }

/* === COLOR TAGS === */
.color-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.color-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 50px; font-size: .85rem;
  background: var(--teal); color: #fff; font-weight: 500;
}
.color-tag .x { cursor: pointer; font-size: .75rem; opacity: .8; }

/* === SIZE GRID === */
.size-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.size-pill {
  padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); font-size: .9rem; font-weight: 500;
  cursor: pointer; transition: all .2s; min-width: 44px; text-align: center;
}
.size-pill.selected { border-color: var(--purple); background: #f3e8ff; color: var(--purple); }

/* === TOGGLE SWITCH === */
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle {
  width: 52px; height: 30px; border-radius: 15px; background: var(--border);
  position: relative; cursor: pointer; transition: background .3s;
}
.toggle.on { background: var(--success); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 24px; height: 24px; border-radius: 50%; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.15); transition: transform .3s;
}
.toggle.on::after { transform: translateX(22px); }

/* === PRICE INPUT === */
.price-wrap {
  display: flex; align-items: center; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card); overflow: hidden;
}
.price-wrap:focus-within { border-color: var(--teal); }
.price-prefix {
  padding: 14px 12px; background: var(--bg); font-weight: 600;
  color: var(--muted); border-right: 1px solid var(--border);
}
.price-wrap input {
  border: none !important; padding: 14px 12px;
  flex: 1; font-size: 1.1rem; font-weight: 600;
}

/* === SUBMIT BUTTON === */
.btn-submit {
  width: 100%; padding: 18px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  color: #fff; font-size: 1.15rem; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 20px rgba(50,225,197,.35); margin-top: 16px;
  transition: transform .15s, box-shadow .15s;
}
.btn-submit:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(50,225,197,.2); }

/* === PRODUCT LIST === */
.product-card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: var(--shadow); display: flex; gap: 14px;
}
.product-card .thumb {
  width: 64px; height: 64px; border-radius: 10px; overflow: hidden; flex-shrink: 0;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
}
.product-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
.product-card .thumb .no-img { font-size: 1.5rem; }
.product-card .info { flex: 1; min-width: 0; }
.product-card .info h3 { font-size: 1rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-card .info .meta { font-size: .8rem; color: var(--muted); }
.product-card .info .price { font-size: 1rem; font-weight: 600; color: var(--teal); margin-top: 4px; }
.product-card .actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.btn-icon {
  width: 38px; height: 38px; border: none; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer; transition: transform .15s;
}
.btn-icon:active { transform: scale(.9); }
.btn-export { background: #e8f5e9; color: var(--success); }
.btn-delete { background: #fce4ec; color: var(--danger); }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

/* === BOTTOM NAV === */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: var(--card);
  border-top: 1px solid var(--border); display: none; z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,.06);
}
.bottom-nav.visible { display: flex; }
.nav-item {
  flex: 1; padding: 10px 0 12px; text-align: center; cursor: pointer;
  color: var(--muted); transition: color .2s; border: none; background: none;
  font-family: var(--font);
}
.nav-item .icon { font-size: 1.3rem; display: block; margin-bottom: 2px; }
.nav-item .label { font-size: .72rem; font-weight: 500; }
.nav-item.active { color: var(--teal); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  padding: 14px 24px; border-radius: 50px; background: var(--text);
  color: #fff; font-size: .9rem; font-weight: 500; z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.2); opacity: 0; transition: opacity .3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0; padding: 24px;
  width: 100%; max-width: 480px; animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { margin-bottom: 12px; }
.modal p { color: var(--muted); margin-bottom: 20px; font-size: .95rem; }
.modal .btns { display: flex; gap: 10px; }
.modal .btns button {
  flex: 1; padding: 14px; border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
}
.btn-cancel { background: var(--bg); color: var(--text); }
.btn-confirm-delete { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login">
  <div class="logo">🦋</div>
  <h1>Maricota</h1>
  <div class="subtitle">Cadastro de Produtos</div>
  <div class="input-group">
    <input type="password" id="pw" placeholder="Digite a senha" autocomplete="off">
  </div>
  <button class="btn-enter" onclick="tryLogin()">Entrar</button>
  <div class="error" id="loginError">Senha incorreta. Tente novamente.</div>
</div>

<!-- ===== FORM SCREEN ===== -->
<div id="formScreen" class="screen">
  <div class="header">
    <span class="logo-sm">🦋</span>
    <h2>Novo Produto</h2>
    <span class="storage-badge" id="storageBadge"></span>
  </div>

  <form id="productForm" onsubmit="return saveProduct(event)">
    <!-- Barcode Scanner -->
    <div class="form-section">
      <h3>📊 Código de Barras</h3>
      <button type="button" class="btn-scan" id="btnScan" onclick="startScanner()">
        <span>📷</span> <span>Escanear Código de Barras</span>
      </button>
      <button type="button" class="btn-stop-scan" id="btnStopScan" onclick="stopScanner()">Parar Scanner</button>
      <div id="scannerContainer"></div>
      <div class="barcode-result" id="barcodeResult">
        <div class="checkmark">✓</div>
        <div class="barcode-value" id="barcodeValue"></div>
        <button type="button" class="barcode-clear" onclick="clearBarcode()">✕</button>
      </div>
      <button type="button" class="btn-scan-manual" id="btnManual" onclick="toggleManualBarcode()">Digitar manualmente</button>
      <div class="manual-barcode-field" id="manualBarcodeField">
        <div class="field">
          <input type="text" id="fBarcodeManual" placeholder="Digite o código de barras" inputmode="numeric" oninput="onManualBarcodeInput(this)">
        </div>
      </div>
      <input type="hidden" id="fBarcode">
    </div>

    <!-- Photos -->
    <div class="form-section">
      <h3>📸 Foto do Produto</h3>
      <div class="photo-area">
        <div class="photo-btns">
          <button type="button" class="btn-camera" onclick="takePhoto('camera')">📷 Tirar Foto</button>
          <button type="button" class="btn-gallery" onclick="takePhoto('gallery')">🖼️ Galeria</button>
        </div>
        <div class="hint">Tire a foto da etiqueta ou da peça na arara</div>
        <div class="photo-preview" id="photoPreview"></div>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple hidden>
      <input type="file" id="galleryInput" accept="image/*" multiple hidden>
    </div>

    <!-- Material -->
    <div class="form-section">
      <h3>🧵 Material</h3>
      <div class="field">
        <label>Composição do tecido (ver etiqueta)</label>
        <select id="fMaterial">
          <option value="">Selecione...</option>
          <option>100% Algodão</option>
          <option>100% Poliéster</option>
          <option>95% Algodão, 5% Elastano</option>
          <option>90% Algodão, 10% Poliéster</option>
          <option>80% Algodão, 20% Poliéster</option>
          <option>67% Poliéster, 33% Algodão</option>
          <option>100% Viscose</option>
          <option>Moletom (80% Algodão, 20% Poliéster)</option>
          <option>Jeans (98% Algodão, 2% Elastano)</option>
          <option>Plush (100% Poliéster)</option>
          <option>Ribana (95% Algodão, 5% Elastano)</option>
          <option>Meia Malha (100% Algodão)</option>
          <option>Suedine (100% Algodão)</option>
        </select>
        <div class="hint">Ou digite abaixo se não encontrar na lista</div>
        <input type="text" id="fMaterialCustom" placeholder="Ex: 60% Algodão, 40% Poliéster" style="margin-top: 8px;">
      </div>
    </div>

    <button type="submit" class="btn-submit">✅ Salvar Produto</button>
  </form>
</div>

<!-- ===== LIST SCREEN ===== -->
<div id="listScreen" class="screen">
  <div class="header">
    <span class="logo-sm">🦋</span>
    <h2>Produtos Salvos</h2>
  </div>
  <div id="productList"></div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-item active" onclick="showScreen('formScreen')">
    <span class="icon">➕</span><span class="label">Novo</span>
  </button>
  <button class="nav-item" onclick="showScreen('listScreen')">
    <span class="icon">📦</span><span class="label">Salvos</span>
  </button>
</nav>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== DELETE MODAL ===== -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Excluir produto?</h3>
    <p>Essa ação não pode ser desfeita.</p>
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm-delete" id="confirmDeleteBtn">Excluir</button>
    </div>
  </div>
</div>

<script>
/* ============================
   PASSWORD GATE
   ============================ */
const PW_HASH = '8e1875b78026c5f4b68cbe5899bfaad477afc6e20bb84cb2879956b79a844913';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tryLogin() {
  const pw = document.getElementById('pw').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem('auth', '1');
    showApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function showApp() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('formScreen').classList.add('active');
  document.getElementById('bottomNav').classList.add('visible');
  updateStorageBadge();
}

// Auto-login if session active
if (sessionStorage.getItem('auth')) showApp();

/* ============================
   SCREEN NAVIGATION
   ============================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n, i) => {
    n.classList.toggle('active', (i === 0 && id === 'formScreen') || (i === 1 && id === 'listScreen'));
  });
  if (id === 'listScreen') renderList();
}

/* ============================
   BARCODE SCANNER
   ============================ */
let html5QrCode = null;
let scannerRunning = false;

function startScanner() {
  if (scannerRunning) return;
  const container = document.getElementById('scannerContainer');
  container.classList.add('active');
  document.getElementById('btnStopScan').classList.add('active');
  document.getElementById('btnScan').style.display = 'none';
  html5QrCode = new Html5Qrcode('scannerContainer');
  const config = {
    fps: 10, qrbox: { width: 280, height: 100 },
    formatsToSupport: [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128
    ]
  };
  html5QrCode.start({ facingMode: 'environment' }, config,
    (decodedText) => { onBarcodeScanned(decodedText); stopScanner(); },
    () => {}
  ).catch(() => { toast('Erro ao acessar a câmera'); stopScanner(); });
  scannerRunning = true;
}

function stopScanner() {
  if (html5QrCode && scannerRunning) {
    html5QrCode.stop().then(() => { html5QrCode.clear(); resetScannerUI(); }).catch(() => { resetScannerUI(); });
  } else { resetScannerUI(); }
}

function resetScannerUI() {
  scannerRunning = false;
  document.getElementById('scannerContainer').classList.remove('active');
  document.getElementById('btnStopScan').classList.remove('active');
  document.getElementById('btnScan').style.display = '';
}

function onBarcodeScanned(code) {
  document.getElementById('fBarcode').value = code;
  document.getElementById('barcodeValue').textContent = code;
  document.getElementById('barcodeResult').classList.add('active');
  document.getElementById('btnScan').style.display = 'none';
  document.getElementById('btnManual').style.display = 'none';
  document.getElementById('manualBarcodeField').classList.remove('active');
  toast('Código detectado! ✅');
}

function clearBarcode() {
  document.getElementById('fBarcode').value = '';
  document.getElementById('barcodeValue').textContent = '';
  document.getElementById('barcodeResult').classList.remove('active');
  document.getElementById('btnScan').style.display = '';
  document.getElementById('btnManual').style.display = '';
  document.getElementById('fBarcodeManual').value = '';
}

function toggleManualBarcode() {
  const field = document.getElementById('manualBarcodeField');
  field.classList.toggle('active');
  if (field.classList.contains('active')) document.getElementById('fBarcodeManual').focus();
}

function onManualBarcodeInput(input) {
  const val = input.value.trim();
  document.getElementById('fBarcode').value = val;
  if (val.length >= 8) {
    document.getElementById('barcodeValue').textContent = val;
    document.getElementById('barcodeResult').classList.add('active');
    document.getElementById('btnScan').style.display = 'none';
    document.getElementById('btnManual').style.display = 'none';
  } else {
    document.getElementById('barcodeResult').classList.remove('active');
    document.getElementById('btnScan').style.display = '';
    document.getElementById('btnManual').style.display = '';
  }
}

/* ============================
   PHOTO HANDLING
   ============================ */
let photos = [];

function takePhoto(mode) {
  if (photos.length >= 5) { toast('Máximo de 5 fotos atingido'); return; }
  const input = document.getElementById(mode === 'camera' ? 'cameraInput' : 'galleryInput');
  input.click();
}

document.getElementById('cameraInput').addEventListener('change', handlePhotos);
document.getElementById('galleryInput').addEventListener('change', handlePhotos);

function handlePhotos(e) {
  const files = Array.from(e.target.files);
  files.slice(0, 5 - photos.length).forEach(file => {
    compressImage(file, (dataUrl) => {
      photos.push(dataUrl);
      renderPhotos();
    });
  });
  e.target.value = '';
}

function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = (maxW / w) * h; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.65));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderPhotos() {
  const el = document.getElementById('photoPreview');
  el.innerHTML = photos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p}" alt="Foto ${i + 1}">
      <div class="remove" onclick="removePhoto(${i})">✕</div>
    </div>
  `).join('');
}

function removePhoto(i) { photos.splice(i, 1); renderPhotos(); }

/* ============================
   SAVE PRODUCT
   ============================ */
function saveProduct(e) {
  e.preventDefault();
  const barcode = document.getElementById('fBarcode').value;
  if (!barcode) { toast('Escaneie ou digite o código de barras'); return false; }
  if (!photos.length) { toast('Tire pelo menos uma foto'); return false; }

  const material = document.getElementById('fMaterialCustom').value || document.getElementById('fMaterial').value;

  const product = {
    id: 'prod_' + Date.now(),
    createdAt: new Date().toISOString(),
    barcode: barcode,
    photos: photos,
    material: material,
  };

  const products = JSON.parse(localStorage.getItem('maricota_products') || '[]');
  products.unshift(product);
  localStorage.setItem('maricota_products', JSON.stringify(products));

  resetForm();
  toast('Produto salvo! O squad vai processar automaticamente ✅');
  updateStorageBadge();
  return false;
}

function resetForm() {
  document.getElementById('productForm').reset();
  photos = [];
  renderPhotos();
  document.getElementById('fMaterialCustom').value = '';
  clearBarcode();
  if (scannerRunning) stopScanner();
}

/* ============================
   PRODUCT LIST
   ============================ */
function renderList() {
  const products = JSON.parse(localStorage.getItem('maricota_products') || '[]');
  const el = document.getElementById('productList');

  if (!products.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>Nenhum produto cadastrado ainda.<br>Toque em "Novo" para começar!</p></div>';
    return;
  }

  el.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="thumb">
        ${p.photos && p.photos.length ? `<img src="${p.photos[0]}" alt="Produto">` : '<span class="no-img">📷</span>'}
      </div>
      <div class="info">
        <h3>${p.barcode || 'Sem código'}</h3>
        <div class="barcode-meta">📊 ${p.barcode || '-'}</div>
        <div class="meta">${p.material || 'Material não informado'}</div>
        <div class="meta">${p.photos ? p.photos.length : 0} foto(s) · ${new Date(p.createdAt).toLocaleString('pt-BR', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}</div>
      </div>
      <div class="actions">
        <button class="btn-icon btn-delete" onclick="confirmDelete('${p.id}')" title="Excluir">🗑️</button>
      </div>
    </div>
  `).join('');
}

/* ============================
   EXPORT MARKDOWN
   ============================ */
function exportMD(id) {
  const products = JSON.parse(localStorage.getItem('maricota_products') || '[]');
  const p = products.find(x => x.id === id);
  if (!p) return;

  const md = `# Product Input — ${p.barcode}

## Código de Barras
${p.barcode}

## Foto
${p.photos ? p.photos.length : 0} foto(s) anexada(s).

## Material
${p.material || 'Não informado'}

## Data
${p.createdAt}
`;

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `product-input-${p.sku || p.id}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Arquivo exportado! 📄');
}

/* ============================
   DELETE
   ============================ */
let deleteTarget = null;

function confirmDelete(id) {
  deleteTarget = id;
  document.getElementById('deleteModal').classList.add('show');
}

function closeModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTarget = null;
}

document.getElementById('confirmDeleteBtn').onclick = () => {
  if (!deleteTarget) return;
  let products = JSON.parse(localStorage.getItem('maricota_products') || '[]');
  products = products.filter(p => p.id !== deleteTarget);
  localStorage.setItem('maricota_products', JSON.stringify(products));
  closeModal();
  renderList();
  updateStorageBadge();
  toast('Produto excluído');
};

/* ============================
   STORAGE BADGE
   ============================ */
function updateStorageBadge() {
  const used = new Blob([localStorage.getItem('maricota_products') || '']).size;
  const kb = Math.round(used / 1024);
  const badge = document.getElementById('storageBadge');
  if (badge) badge.textContent = kb > 0 ? `${kb} KB` : '';
}

/* ============================
   TOAST
   ============================ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

/* ============================
   SERVICE WORKER
   ============================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
